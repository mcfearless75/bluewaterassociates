<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found - Bluewater Associates</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F1EA;--ink:#0F1B2D;--accent:#C75634;--muted:#5a6273}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;-webkit-font-smoothing:antialiased}
.box{max-width:520px;text-align:center}
.brand{font-family:'Fraunces',serif;font-weight:800;font-size:1.5rem;letter-spacing:-.02em;text-decoration:none;color:var(--ink);display:inline-block;margin-bottom:3rem}
.brand .dot{color:var(--accent)}
.code{font-family:'Fraunces',serif;font-weight:800;font-size:clamp(5rem,15vw,9rem);line-height:1;letter-spacing:-.03em;color:var(--accent);margin-bottom:.5rem}
h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(1.6rem,4vw,2.2rem);letter-spacing:-.01em;margin-bottom:1rem}
p{color:var(--muted);font-size:1.05rem;margin-bottom:2rem;line-height:1.6}
a.cta{display:inline-block;background:var(--ink);color:var(--bg);padding:.85rem 1.6rem;border-radius:6px;text-decoration:none;font-weight:500;transition:transform .2s,background .2s}
a.cta:hover{transform:translateY(-1px);background:var(--accent)}
</style>
</head>
<body>
<div class="box">
<a href="/" class="brand">Bluewater<span class="dot">.</span></a>
<div class="code">404</div>
<h1>That page isn't here.</h1>
<p>The link may be old or mistyped. Head back to the homepage and we'll point you the right way.</p>
<a href="/" class="cta">Back to homepage</a>
</div>
</body>
</html>
