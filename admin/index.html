<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Tickets - Bluewater Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F1EA;--ink:#0F1B2D;--accent:#C75634;--gold:#C9A961;--muted:#5a6273;--card:#fff;--border:rgba(15,27,45,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
header{background:var(--ink);color:var(--bg);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:5}
.brand{font-family:'Fraunces',serif;font-weight:800;font-size:1.3rem;letter-spacing:-.02em;text-decoration:none;color:var(--bg)}
.brand .dot{color:var(--accent)}
header nav{display:flex;gap:1rem;align-items:center;font-size:.9rem}
header nav a,header nav button{color:var(--bg);background:transparent;border:none;font:inherit;cursor:pointer;text-decoration:none;opacity:.85;transition:opacity .2s}
header nav a:hover,header nav button:hover{opacity:1}
main{max-width:1200px;margin:0 auto;padding:2rem 1.5rem 4rem}
.signin{max-width:420px;margin:6rem auto;padding:2.5rem;background:var(--card);border-radius:12px;box-shadow:0 8px 32px rgba(15,27,45,.06)}
.signin h1{font-family:'Fraunces',serif;font-weight:700;font-size:1.8rem;margin-bottom:.5rem;letter-spacing:-.01em}
.signin p{color:var(--muted);margin-bottom:1.5rem;font-size:.95rem}
input,select,textarea{width:100%;padding:.7rem .85rem;border:1px solid var(--border);border-radius:6px;font:inherit;background:#fff;color:var(--ink);transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
button.primary{background:var(--ink);color:var(--bg);border:none;padding:.75rem 1.4rem;border-radius:6px;font:inherit;font-weight:500;cursor:pointer;transition:background .15s,transform .15s}
button.primary:hover{background:var(--accent)}
button.primary:active{transform:translateY(1px)}
button.primary:disabled{opacity:.55;cursor:not-allowed}
.bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
.bar h1{font-family:'Fraunces',serif;font-weight:700;font-size:2rem;letter-spacing:-.01em}
.filters{display:flex;gap:.5rem;flex-wrap:wrap}
.chip{padding:.35rem .85rem;border:1px solid var(--border);border-radius:999px;background:#fff;cursor:pointer;font-size:.85rem;color:var(--ink);transition:all .15s}
.chip:hover{border-color:var(--accent)}
.chip.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.tickets{display:grid;gap:.75rem}
.ticket{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;display:grid;grid-template-columns:auto 1fr auto;gap:1rem;align-items:start;cursor:pointer;transition:border-color .15s,transform .15s}
.ticket:hover{border-color:var(--accent)}
.src{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;padding:.25rem .6rem;border-radius:4px;font-weight:700;align-self:start;white-space:nowrap}
.src.voicemail{background:#fde4d4;color:#a3411f}
.src.missed_call{background:#fef0d4;color:#8b6914}
.src.call{background:#d4e8fd;color:#1f4a8b}
.src.readiness{background:#d6f0e3;color:#1f6b3e}
.src.contact{background:#e8d4fd;color:#5a1f8b}
.ticket .meta{display:flex;flex-direction:column;gap:.2rem;min-width:0}
.ticket .meta strong{font-weight:600;font-size:1rem;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ticket .meta small{color:var(--muted);font-size:.85rem}
.ticket .when{color:var(--muted);font-size:.8rem;white-space:nowrap;align-self:start}
.status{padding:.2rem .55rem;border-radius:4px;font-size:.7rem;text-transform:uppercase;font-weight:700;letter-spacing:.05em}
.status.new{background:var(--accent);color:#fff}
.status.in_progress{background:var(--gold);color:#3a2c0a}
.status.closed{background:#d4d8e0;color:#5a6273}
.empty{text-align:center;padding:4rem 1rem;color:var(--muted)}
.empty h2{font-family:'Fraunces',serif;font-weight:600;font-size:1.4rem;margin-bottom:.5rem;color:var(--ink)}
.error{background:#fde4d4;border-left:3px solid var(--accent);padding:.85rem 1rem;border-radius:6px;margin-bottom:1rem;color:#a3411f;font-size:.9rem}
.success{background:#d6f0e3;border-left:3px solid #1f6b3e;padding:.85rem 1rem;border-radius:6px;margin-bottom:1rem;color:#1f6b3e;font-size:.9rem}
/* drawer */
.drawer{position:fixed;inset:0;z-index:20;background:rgba(15,27,45,.4);display:none;align-items:stretch;justify-content:flex-end}
.drawer.open{display:flex}
.drawer-panel{background:var(--bg);width:min(560px,100%);height:100%;overflow-y:auto;padding:2rem 1.75rem;box-shadow:-8px 0 32px rgba(0,0,0,.15)}
.drawer h2{font-family:'Fraunces',serif;font-weight:700;font-size:1.5rem;margin-bottom:.25rem;letter-spacing:-.01em}
.drawer .when{color:var(--muted);font-size:.85rem;margin-bottom:1.5rem}
.field{margin-bottom:1.25rem}
.label{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;font-weight:700;color:var(--muted);margin-bottom:.35rem}
.value{font-size:.95rem;color:var(--ink);word-break:break-word}
.value a{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(199,86,52,.3)}
.body-block{white-space:pre-wrap;background:#fff;padding:1rem;border-radius:6px;border:1px solid var(--border);font-size:.92rem;line-height:1.55}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.drawer-actions{display:flex;gap:.5rem;margin-top:1.5rem}
.close-x{position:absolute;top:1rem;right:1.25rem;background:transparent;border:none;font-size:1.5rem;color:var(--muted);cursor:pointer;line-height:1}
@media (max-width:640px){.row2{grid-template-columns:1fr}.drawer-panel{padding:1.5rem 1.25rem}}

/* === MOBILE POLISH (added by responsive audit) === */
html,body{overflow-x:hidden;max-width:100%}
input,select,textarea{font-size:16px}
@media (max-width:560px){
  header{padding:.85rem 1rem;flex-wrap:wrap;gap:.5rem}
  header nav{font-size:.85rem;gap:.6rem;flex-wrap:wrap}
  main{padding:1.25rem 1rem 3rem}
  .signin{margin:2.5rem auto;padding:1.75rem;border-radius:10px}
  .signin h1{font-size:1.5rem}
  .bar h1{font-size:1.5rem}
  .ticket{grid-template-columns:1fr;gap:.5rem;padding:.9rem 1rem}
  .ticket .when{align-self:auto}
  .filters{gap:.4rem}
  .chip{padding:.4rem .8rem;font-size:.8rem;min-height:36px;display:inline-flex;align-items:center}
  button.primary{width:100%;padding:.85rem 1.2rem;min-height:44px}
  .drawer-panel{padding:1.25rem 1rem;width:100%}
  .drawer-actions{flex-direction:column}
  .drawer-actions button{width:100%;min-height:44px}
}
</style>
</head>
<body>
<header>
<a href="/" class="brand">Bluewater<span class="dot">.</span> Admin</a>
<nav id="nav"><span id="who"></span> <button id="signout" hidden>Sign out</button></nav>
</header>

<main>
<div id="auth" class="signin" hidden>
<h1>Admin sign in</h1>
<p>Enter your admin email. We'll send a magic link - click it to sign in.</p>
<div id="auth-msg"></div>
<form id="signin-form" style="display:grid;gap:.75rem">
<input id="email" type="email" placeholder="paul@bluewaterassociates.co.uk" autocomplete="email" required>
<button class="primary" type="submit">Send magic link</button>
</form>
</div>

<div id="app" hidden>
<div class="bar">
<h1>Tickets</h1>
<div class="filters" id="filters">
<button class="chip active" data-f="all">All</button>
<button class="chip" data-f="new">New</button>
<button class="chip" data-f="in_progress">In progress</button>
<button class="chip" data-f="closed">Closed</button>
</div>
</div>
<div id="list-msg"></div>
<div class="tickets" id="tickets"></div>
<div class="empty" id="empty" hidden><h2>No tickets yet.</h2><p>Calls, voicemails and form submissions will appear here.</p></div>
</div>
</main>

<div class="drawer" id="drawer">
<div class="drawer-panel" style="position:relative">
<button class="close-x" id="close-drawer" aria-label="Close">×</button>
<div id="drawer-body"></div>
</div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ─── CONFIG ─────────────────────────────────────────────────────────────
// Set these once after creating the Supabase project (Project Settings → API).
// Use the ANON / publishable key here - RLS in the database is what enforces access.
const SUPABASE_URL = 'https://qjwemrarhnjrvdzwaudm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqd2VtcmFyaG5qcnZkendhdWRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NDU3NjgsImV4cCI6MjA5NTEyMTc2OH0.gOAr4qG-7FsCe8-kw-0rsx4tpZAaUMWSOh2vi3ogSXU';
// ─────────────────────────────────────────────────────────────────────────

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { detectSessionInUrl: true, flowType: 'pkce', persistSession: true },
});

const $ = (id) => document.getElementById(id);
let currentFilter = 'all';

function msg(el, text, type = 'error') {
  el.innerHTML = text ? `<div class="${type}">${text}</div>` : '';
}

async function refreshAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    $('auth').hidden = true;
    $('app').hidden = false;
    $('who').textContent = session.user.email;
    $('signout').hidden = false;
    loadTickets();
  } else {
    $('auth').hidden = false;
    $('app').hidden = true;
    $('signout').hidden = true;
    $('who').textContent = '';
  }
}

$('signin-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = $('email').value.trim();
  msg($('auth-msg'), '');
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.href.split('#')[0] },
  });
  if (error) { msg($('auth-msg'), error.message); return; }
  msg($('auth-msg'), `Magic link sent to ${email}. Check your inbox.`, 'success');
});

$('signout').addEventListener('click', async () => { await sb.auth.signOut(); refreshAuth(); });

document.querySelectorAll('.chip').forEach((c) => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach((x) => x.classList.remove('active'));
    c.classList.add('active');
    currentFilter = c.dataset.f;
    loadTickets();
  });
});

async function loadTickets() {
  let q = sb.from('tickets').select('*').order('created_at', { ascending: false }).limit(200);
  if (currentFilter !== 'all') q = q.eq('status', currentFilter);
  const { data, error } = await q;
  if (error) { msg($('list-msg'), error.message); return; }
  msg($('list-msg'), '');
  const list = $('tickets');
  list.innerHTML = '';
  $('empty').hidden = data.length > 0;
  for (const t of data) list.appendChild(renderRow(t));
}

function fmt(ts) {
  const d = new Date(ts);
  const today = new Date();
  const isToday = d.toDateString() === today.toDateString();
  if (isToday) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }) + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function renderRow(t) {
  const el = document.createElement('div');
  el.className = 'ticket';
  const who = t.contact_name || t.contact_phone || t.contact_email || '-';
  const sub = t.subject || '(no subject)';
  el.innerHTML = `
    <span class="src ${t.source}">${t.source.replace('_', ' ')}</span>
    <div class="meta">
      <strong>${escape(sub)}</strong>
      <small>${escape(who)}${t.company ? ' · ' + escape(t.company) : ''}</small>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.4rem">
      <span class="status ${t.status}">${t.status.replace('_', ' ')}</span>
      <span class="when">${fmt(t.created_at)}</span>
    </div>`;
  el.addEventListener('click', () => openDrawer(t));
  return el;
}

function escape(s) {
  return String(s ?? '').replace(/[<>&"]/g, (c) => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' }[c]));
}

function openDrawer(t) {
  const b = $('drawer-body');
  b.innerHTML = `
    <h2>${escape(t.subject || '(no subject)')}</h2>
    <div class="when">${new Date(t.created_at).toLocaleString('en-GB')} · ${t.source.replace('_', ' ')}</div>

    <div class="row2">
      <div class="field"><div class="label">Name</div><div class="value">${escape(t.contact_name || '-')}</div></div>
      <div class="field"><div class="label">Company</div><div class="value">${escape(t.company || '-')}</div></div>
      <div class="field"><div class="label">Email</div><div class="value">${t.contact_email ? `<a href="mailto:${escape(t.contact_email)}">${escape(t.contact_email)}</a>` : '-'}</div></div>
      <div class="field"><div class="label">Phone</div><div class="value">${t.contact_phone ? `<a href="tel:${escape(t.contact_phone)}">${escape(t.contact_phone)}</a>` : '-'}</div></div>
    </div>

    ${t.body ? `<div class="field"><div class="label">Body</div><div class="body-block">${escape(t.body)}</div></div>` : ''}

    <details class="field"><summary class="label" style="cursor:pointer">Raw payload</summary>
      <pre class="body-block" style="font-family:ui-monospace,Menlo,monospace;font-size:.8rem;margin-top:.4rem">${escape(JSON.stringify(t.payload, null, 2))}</pre>
    </details>

    <div class="field"><div class="label">Status</div>
      <select id="status-sel">
        <option value="new" ${t.status === 'new' ? 'selected' : ''}>New</option>
        <option value="in_progress" ${t.status === 'in_progress' ? 'selected' : ''}>In progress</option>
        <option value="closed" ${t.status === 'closed' ? 'selected' : ''}>Closed</option>
      </select>
    </div>
    <div class="field"><div class="label">Notes</div>
      <textarea id="notes" rows="4" placeholder="Add notes…">${escape(t.notes || '')}</textarea>
    </div>
    <div class="drawer-actions">
      <button class="primary" id="save">Save</button>
    </div>
    <div id="drawer-msg" style="margin-top:1rem"></div>
  `;
  $('drawer').classList.add('open');
  $('save').addEventListener('click', async () => {
    const status = $('status-sel').value;
    const notes = $('notes').value;
    const { error } = await sb.from('tickets').update({ status, notes }).eq('id', t.id);
    if (error) { msg($('drawer-msg'), error.message); return; }
    msg($('drawer-msg'), 'Saved.', 'success');
    setTimeout(() => { $('drawer').classList.remove('open'); loadTickets(); }, 600);
  });
}

$('close-drawer').addEventListener('click', () => $('drawer').classList.remove('open'));
$('drawer').addEventListener('click', (e) => { if (e.target.id === 'drawer') $('drawer').classList.remove('open'); });

sb.auth.onAuthStateChange(() => refreshAuth());
refreshAuth();
</script>
</body>
</html>
