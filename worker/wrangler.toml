name = "bluewater-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# Set these via `wrangler secret put <NAME>` — never commit values:
#   TWILIO_AUTH_TOKEN    — from Twilio console
#   TWILIO_ACCOUNT_SID   — from Twilio console (not sensitive, but keep out of repo)
#   SUPABASE_URL         — https://<project>.supabase.co
#   SUPABASE_SERVICE_KEY — service_role key (Supabase → Project Settings → API)
#   RESEND_API_KEY       — re_... key from resend.com
#   MAILERLITE_API_KEY   — MailerLite → Integrations → API → API tokens
#
# Public (non-secret) vars below:

[vars]
ALERT_FROM    = "hello@bluewaterassociates.co.uk"
ALERT_TO      = "hello@bluewaterassociates.co.uk"
ALLOWED_ORIGIN = "https://bluewaterassociates.co.uk"
TWILIO_PHONE_E164   = "+448000884711"    # UK toll-free, active
FORWARD_TO_E164     = "+447841636133"    # rings before voicemail kicks in
MAILERLITE_GROUP_ID = "188730803897763314"   # The Red Ledger — Waitlist

# Custom domain (requires DNS on Cloudflare). Uncomment after migrating DNS:
# [[routes]]
# pattern = "api.bluewaterassociates.co.uk/*"
# zone_name = "bluewaterassociates.co.uk"
